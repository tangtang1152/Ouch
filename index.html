<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ouch</title>
  <link rel="stylesheet" href="style.css">
  
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#d32f2f">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ouch">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body>
  <div class="container">
    <button class="dir-btn" onclick="playSound('up')">↑</button>

    <div class="middle-row">
      <button class="dir-btn" onclick="playSound('left')">←</button>
      <button class="ouch-btn" onclick="playSound('ouch')">OUCH</button>
      <button class="dir-btn" onclick="playSound('right')">→</button>
    </div>

    <button class="dir-btn" onclick="playSound('down')">↓</button>
    
    <button id="mode-btn" class="mode-btn" onclick="toggleMotionMode()">
      开启动作模式
    </button>

    <p id="status-text">动作模式未开启</p>

  <div class="debug-container">
    <div class="debug-block">
      <div class="debug-title">motion</div>
      <div id="debug-text1" class="debug-panel"></div>
    </div>

    <div class="debug-block">
      <div class="debug-title">audio</div>
      <div id="debug-text2" class="debug-panel"></div>
    </div>

    <div class="debug-block">
      <div class="debug-title">audio event</div>
      <div id="debug-text3" class="debug-panel"></div>
    </div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
